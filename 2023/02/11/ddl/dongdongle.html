<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>洞洞乐</title>
        <style>
            .main{
                text-align: center; /*让div内部文字居中*/
                background-color: #fff;
                background-image: url(bg.png);
                border: #f00 2px;
                border-radius: 20px;
                width: 660px;
                height: 690px;
                margin: auto;
                position: absolute;
                top: 0;
                left: 150px;
                right: 0;
                bottom: 0;
            }
            .box { 
                border-top: 2px solid black; 
                border-left: 2px solid black;
                border-bottom: 2px solid black;
                border-right: 2px solid black;
                text-align: center;
            }

            .btns{
                height: 200px;
                width: 200px;
                font-size: 20px;
                margin-right: 20px;
                margin-top: 20px;
                color: #ffffff;
            }

            .circle{
                width: 100px;
                height: 100px;
                background: red;
                border-radius: 50%;
                text-align: center;
            }

            .heart {
                width: 100px;
                height: 100px;
                position: relative;
                background-color: #f00;
                transform: rotate(45deg);
            }
            .heart::before,
            .heart::after {
                position: absolute;
                content: '';
                background-color: #f00;
                top: 0px;
                left: -50%;
                width: 100%;
                height: 100%;
                border-radius: 50%;
            }

            .heart::after {
                left: 0;
                top: -50%;
            }

            .img01{  
                display: block;
                animation: rotate 5s linear;
            } 
            @keyframes rotate{
                0%{
                    transform: rotateZ(0deg);/*从0度开始*/
                }
                100%{
                    transform: rotateZ(360deg);/*360度结束*/
                }
            }

        </style>
        
        <script type="text/javascript">

            function sleep(delay) {
                return new Promise(resolve =>
                    setTimeout(resolve, delay)
                )
            }
            function click_ear(){
                var x="耳钉"
                var ear = document.getElementById("ear")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('ear.png')"
                    ear.innerText=x;
                })
            }
            function click_perfume(){
                var x="香水"
                var ear = document.getElementById("perfume")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('perfume.png')"
                    ear.innerText=x;
                })
            }
            function click_phone(){
                var x="手机壳"
                var ear = document.getElementById("phone")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('phone.png')"
                    ear.innerText=x;
                })
            }
            function click_glass(){
                var x="墨镜"
                var ear = document.getElementById("glass")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('glass.png')"
                    ear.innerText=x;
                })
            }
            function click_body(){
                var x="身体乳"
                var ear = document.getElementById("body")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('body.png')"
                    ear.innerText=x;
                })
            }
            function click_concert(){
                var x="内场门票"
                var ear = document.getElementById("concert")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('concert.png')"
                    ear.innerText=x;
                })
            }
            function click_50(){
                var x="V我50"
                var ear = document.getElementById("50")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('50.png')"
                    ear.innerText=x;
                })
            }
            function click_anaya(){
                var x="阿那亚1日游"
                var ear = document.getElementById("anaya")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('anaya.png')"
                    ear.innerText=x;
                })
            }
            function click_pig(){
                var x="小猪"
                var ear = document.getElementById("pig")
                ear.className="btns img01"
                sleep(5000).then(() => {
                    ear.style.backgroundImage="url('pig.png')"
                    ear.innerText=x;
                })
            }

        </script>
    </head>
    <body background="bg1.png"
    style="background-repeat:no-repeat;
        background-attachment:fixed;
        background-size:100% 100%; ">
        <div class="main">

        <!-- 1.耳钉 2.手机壳 3.香水 4.墨镜 5.身体乳 6.V我50 7.演唱会门票 8.阿那亚 9.小猪-->
        <table>
            <tr>
              <td>
                <button class="btns" id="ear" style="background:url(1.png);" onclick="click_ear()">

                </button>
              </td>
              <td>                
                <button class="btns" id="phone" style="background: url(2.png);" onclick="click_phone()">

                </button>
            </td>
              <td>
                <button class="btns" id="glass" style="background: url(3.png);" onclick="click_glass()">

                </button>
              </td>
            </tr>
            <tr>
                <td>
                    <button class="btns" id="50" style="background: url(4.png);" onclick="click_50()">

                    </button>
                </td>
                <td>                
                    <button class="btns" id="perfume" style="background: url(5.png);" onclick="click_perfume()">

                    </button>
              </td>
                <td>
                    <button class="btns" id="body" style="background: url(6.png);" onclick="click_body()">

                    </button>
                </td>
              </tr>
              <tr>
                <td>
                    <button class="btns" id="concert" style="background: url(7.png);" onclick="click_concert()">

                    </button>
                </td>
                <td>
                    <button class="btns" id="anaya" style="background:url(8.png);" onclick="click_anaya()">
                    
                    </button>
                </td>
                <td>
                    <button class="btns" id="pig" style="background: url(9.png);" onclick="click_pig()">
                    
                    </button>
                </td>
              </tr>
            </table>
        </div>
    </body>
    <script src="sakura.js"></script>
</html>
